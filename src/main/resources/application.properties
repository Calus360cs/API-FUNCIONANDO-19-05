spring.application.name=docelivery

# --- SQL Server Configuration ---
# Adicionada a propriedade database de forma mais explicita
spring.datasource.url=jdbc:sqlserver://localhost:1433;database=docelivery;encrypt=true;trustServerCertificate=true;integratedSecurity=false
spring.datasource.username=SA
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORRECAO DO AVISO: Desativa o Open-In-View para melhorar performance e conexoes
spring.jpa.open-in-view=false

# --- Hikari Connection Pool (Melhoria de estabilidade) ---
# Ajuda a evitar o erro Connection is closed que vimos nos seus logs
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# --- Security & Error Handling ---
spring.server.error.include-message=always
api.security.token.secret=${JWT_SECRET:EssaEhUmaSenhaSuperSecretaDoCaiqueParaODocelivery2026}

# --- Logging (Opcional, ajuda a debugar o login)
logging.level.org.springframework.security=INFO