# ===================================================================
# Nome da Aplica��gito
# ===================================================================
spring.application.name=docelivery

# ===================================================================
# --- SQL Server Configuration ---
# ===================================================================
# Removido ponto e v�rgula solto e garantido o dialeto correto
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=docelivery;encrypt=true;trustServerCertificate=true
spring.datasource.username=SA
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Dialeto detectado automaticamente pelo Hibernate 7 — não precisa setar manualmente


# ===================================================================
# --- JPA / Hibernate ---
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# --- Hikari Connection Pool ---
# ===================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# ===================================================================
# --- Security & JWT ---
# ===================================================================
logging.level.org.springframework.boot.autoconfigure.security=INFO
spring.security.user.name=admin
spring.security.user.password=admin123

server.error.include-message=always
# A vari�vel JWT_SECRET deve ter pelo menos 32 caracteres para algoritmos modernos
api.security.token.secret=${JWT_SECRET:EssaEhUmaSenhaSuperSecretaDoCaiqueParaODocelivery2026}

# ===================================================================
# --- Logs de Debug ---
# ===================================================================
logging.level.org.springframework.web=INFO
# Reduzido de DEBUG para INFO para n�o poluir o console, exceto se houver erro
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================================================
# --- Configura��es de Upload de Arquivos ---
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ===================================================================
# --- Diret�rio de Armazenamento (Solu��o Definitiva) ---
# ===================================================================
# Garante que o ProdutoService encontre a pasta exata no C:
app.upload.dir=C:/docelivery-storage/
# Mantido para compatibilidade, caso algum outro componente utilize
app.upload.path=C:/docelivery-storage/

